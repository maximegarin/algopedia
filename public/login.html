<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A L G O P E D I A – Log in</title>
<link rel="stylesheet" href="./CSS/login.css">
<link rel="shortcut icon" href="assets/images/codeshare-logo.svg" type="image/x-icon">

</head>
<body>

  <div class="left"></div>

  <div class="right">
    <div class="login-container">
      
      <img src="../assets/images/codeshare-logo.svg" alt="Logo du site" class="logo">

      <h1>Connexion</h1>

      <form>
        
        <input id="mail" type="text" placeholder="Email ou nom d'utilisateur" required>
        <input id="password" type="password" placeholder="Mot de passe" required>
        <button id="submit" type="submit">Entrer</button>
        
      </form>

      <div class="links">
        <a href="#">Créer un compte</a> · <a href="#">Mot de passe oublié ?</a>
        <p id="result"></p>
      </div>
    </div>
  </div>


  <script src="../modules/log-in.js"></script>
</body>
</html>
